<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT 命題工作平臺 - 審題任務</title>
    <link rel="icon" type="image/png" href="./assets/images/pencil.png">
    <!-- Tailwind CSS v4 Browser Build -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-oatmeal: #FBF9F6;
            --color-morandi: #6B8EAD;
            --color-sage: #8EAB94;
            --color-terracotta: #D98A6C;
            --color-slate-main: #374151;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-oatmeal);
            color: var(--color-slate-main);
            transition: font-size 0.3s ease;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tab 底線動畫 */
        .tab-btn {
            position: relative;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: #6b7280;
            transition: color 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            border: none;
            background: none;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 3px 3px 0 0;
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }
        .tab-btn:hover { color: var(--color-slate-main); }
        .tab-btn.active-review { color: var(--color-terracotta); }
        .tab-btn.active-review::after { background: var(--color-terracotta); transform: scaleX(1); }
        .tab-btn.active-history { color: var(--color-morandi); }
        .tab-btn.active-history::after { background: var(--color-morandi); transform: scaleX(1); }

        /* 題目卡片 hover */
        .q-card {
            transition: all 0.15s ease;
            border: 1.5px solid transparent;
        }
        .q-card:hover {
            border-color: var(--color-morandi);
            box-shadow: 0 4px 12px -2px rgba(107, 142, 173, 0.15);
        }

        /* 階段指示燈 */
        @keyframes stage-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(217, 138, 108, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(217, 138, 108, 0); }
        }
        .stage-active { animation: stage-pulse 2s infinite; }

        /* 表單 modal 動畫 */
        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.97) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate-in { animation: modalSlideIn 0.3s ease forwards; }

        /* Quill 審題意見編輯器 */
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #e5e7eb !important; background: #f9fafb; flex-shrink: 0; }
        .ql-container.ql-snow { border: none !important; font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; }
        #reviewQuillContainer { display: flex; flex-direction: column; height: 140px; border: 1px solid #d1d5db; border-radius: 0.5rem; overflow: hidden; }
        #reviewQuillContainer .ql-toolbar.ql-snow { flex-shrink: 0; }
        #reviewQuillContainer .ql-container.ql-snow { flex: 1; min-height: 0; }
        .ql-editor { min-height: 0; height: 100%; max-height: 100%; overflow-y: auto; line-height: 1.7; }
        .ql-editor:focus { outline: none; }

        /* 自訂字體 for Quill */
        .ql-font-kaiti { font-family: '標楷體', 'DFKai-SB', 'BiauKai', serif; }
        .ql-font-times-new-roman { font-family: 'Times New Roman', Times, serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item::before { content: '預設字體'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="kaiti"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="kaiti"]::before { content: '標楷體'; font-family: '標楷體', 'DFKai-SB', serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times-new-roman"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times-new-roman"]::before { content: 'Times New Roman'; font-family: 'Times New Roman', Times, serif; }

        /* 審查意見抽屜 */
        .drawer-toggle-bar {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s ease;
        }
        .drawer-toggle-bar:hover { background-color: #f3f4f6; }
        .drawer-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .drawer-body.open {
            max-height: 50vh;
            overflow-y: auto;
        }
        .drawer-chevron {
            transition: transform 0.3s ease;
        }
        .drawer-chevron.open {
            transform: rotate(180deg);
        }

        /* 罐頭訊息按鈕 */
        .canned-btn {
            padding: 4px 10px;
            font-size: 0.75rem;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 9999px;
            background: white;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .canned-btn:hover { background: var(--color-terracotta); color: white; border-color: var(--color-terracotta); }

        /* 中文標點按鈕 */
        .punct-btn {
            padding: 2px 8px;
            font-size: 0.875rem;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Noto Sans TC', sans-serif;
            flex-shrink: 0;
        }
        .punct-btn:hover { background: var(--color-morandi); color: white; border-color: var(--color-morandi); }

        /* 七階段時程燈號條 */
        .stage-timeline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            position: relative;
            padding: 0 8px;
        }
        .stage-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
            min-width: 0;
        }
        .stage-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .stage-dot.done {
            background: var(--color-sage);
            color: white;
            box-shadow: 0 2px 6px rgba(142, 171, 148, 0.35);
        }
        .stage-dot.active {
            background: var(--color-terracotta);
            color: white;
            box-shadow: 0 2px 8px rgba(217, 138, 108, 0.4);
            animation: stage-pulse 2s infinite;
        }
        .stage-dot.upcoming {
            background: #e5e7eb;
            color: #9ca3af;
        }
        .stage-label {
            margin-top: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            white-space: nowrap;
            text-align: center;
        }
        .stage-label.done { color: var(--color-sage); }
        .stage-label.active { color: var(--color-terracotta); font-weight: 700; }
        /* 連接線（用 CSS 偽元素在 JS 渲染中以 div 實現） */
        .stage-line {
            position: absolute;
            top: 14px;
            height: 3px;
            border-radius: 2px;
            z-index: 0;
        }
        .stage-line.done { background: var(--color-sage); }
        .stage-line.upcoming { background: #e5e7eb; }
    </style>
</head>

<body class="min-h-screen relative flex flex-col h-screen overflow-hidden">
    <!-- Navbar Container (Injected via shared.js) -->
    <div id="navbar-container" class="flex-shrink-0"></div>

    <!-- ============================== -->
    <!-- Main Content Area              -->
    <!-- ============================== -->
    <div class="flex-grow flex flex-col w-full max-w-[1920px] mx-auto h-[calc(100vh-4rem)] overflow-hidden">

        <!-- Header: Breadcrumb + Title -->
        <div class="px-4 sm:px-6 lg:px-8 py-4 flex-shrink-0 bg-white/50 backdrop-blur-sm border-b border-gray-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <div>
                    <nav class="flex text-sm text-gray-500 mb-1 font-medium" aria-label="Breadcrumb">
                        <ol class="inline-flex items-center space-x-1">
                            <li><a href="firstpage.html" class="hover:text-[var(--color-morandi)] transition-colors"><i
                                        class="fa-solid fa-house mr-1"></i> 首頁</a></li>
                            <li>
                                <div class="flex items-center"><i
                                        class="fa-solid fa-chevron-right text-xs mx-1.5"></i><span
                                        class="text-[var(--color-slate-main)]">審題任務</span></div>
                            </li>
                        </ol>
                    </nav>
                    <div class="flex items-center gap-3">
                        <h1 class="text-2xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-magnifying-glass-chart text-[var(--color-terracotta)]"></i> 審題任務
                        </h1>
                        <!-- 當前階段指示燈 -->
                        <span id="stageIndicator"
                            class="inline-flex items-center gap-1.5 text-xs font-bold px-3 py-1 rounded-full bg-[var(--color-terracotta)]/15 text-[var(--color-terracotta)] border border-[var(--color-terracotta)]/30">
                            <span class="w-2 h-2 rounded-full bg-[var(--color-terracotta)] stage-active"></span>
                            交互審題進行中
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scrollable Body -->
        <div class="flex-grow overflow-y-auto custom-scroll">

            <!-- ============================== -->
            <!-- 二大 Tab 工作區                   -->
            <!-- ============================== -->
            <div class="px-4 sm:px-6 lg:px-8 py-5">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

                    <!-- Tab Bar -->
                    <div class="flex border-b border-gray-200 bg-white sticky top-0 z-20 overflow-x-auto">
                        <button class="tab-btn active-review" data-tab="review">
                            <i class="fa-solid fa-clipboard-check mr-1.5 text-[var(--color-terracotta)]"></i>審題作業區
                            <span id="tabCountReview"
                                class="ml-2 text-xs bg-[var(--color-terracotta)]/15 text-[var(--color-terracotta)] px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                        <button class="tab-btn" data-tab="history">
                            <i class="fa-solid fa-box-archive mr-1.5 text-[var(--color-morandi)]"></i>審核結果與歷史
                            <span id="tabCountHistory"
                                class="ml-2 text-xs bg-[var(--color-morandi)]/15 text-[var(--color-morandi)] px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>

                    <!-- Tab 統計卡片區 -->
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50 flex-shrink-0" id="tabStatsContainer">
                        <!-- JS 動態渲染 -->
                    </div>

                    <!-- 篩選列 -->
                    <div
                        class="p-4 border-b border-gray-100 bg-white flex flex-col xl:flex-row gap-3 items-start xl:items-center justify-between flex-shrink-0">
                        <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                            <div class="relative w-full md:w-56">
                                <i class="fa-solid fa-magnifying-glass left-3 top-2.5 absolute text-gray-400"></i>
                                <input type="text" id="filterKeyword"
                                    class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)]"
                                    placeholder="搜尋題號或關鍵字...">
                            </div>
                            <select id="filterType"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有題型</option>
                                <option value="single">一般單選題</option>
                                <option value="select">精選單選題</option>
                                <option value="readGroup">閱讀題組</option>
                                <option value="longText">長文題目</option>
                                <option value="shortGroup">短文題組</option>
                                <option value="listen">聽力測驗</option>
                                <option value="listenGroup">聽力題組</option>
                            </select>
                            <select id="filterLevel"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有等級</option>
                                <option value="初級">初級</option>
                                <option value="中級">中級</option>
                                <option value="中高級">中高級</option>
                                <option value="高級">高級</option>
                                <option value="優級">優級</option>
                                <option value="難度一">難度一</option>
                                <option value="難度二">難度二</option>
                                <option value="難度三">難度三</option>
                                <option value="難度四">難度四</option>
                                <option value="難度五">難度五</option>
                            </select>
                            <select id="filterStatus"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有狀態</option>
                            </select>
                        </div>
                        <div class="flex flex-wrap items-center justify-between gap-3 w-full xl:w-auto xl:justify-end">
                            <label class="flex items-center gap-2 text-sm text-gray-500 font-medium whitespace-nowrap">
                                每頁顯示
                                <select id="pageSizeSelect"
                                    class="px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                    <option value="12">12 題</option>
                                    <option value="24">24 題</option>
                                    <option value="48">48 題</option>
                                </select>
                            </label>
                            <div id="listMeta" class="text-sm text-gray-500 font-medium flex-shrink-0">
                                共 <span id="listCount" class="text-[var(--color-morandi)] font-bold">0</span> 題
                                <span id="listPageMeta" class="text-xs text-gray-400 ml-1"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 題目列表 -->
                    <div class="divide-y divide-gray-100" id="questionListContainer">
                        <div class="p-12 text-center text-gray-400">
                            <i class="fa-solid fa-spinner fa-spin mr-2"></i> 載入中...
                        </div>
                    </div>

                    <div id="listPagination"
                        class="hidden px-4 py-3 border-t border-gray-100 bg-gray-50/70 flex flex-col sm:flex-row items-center justify-between gap-3">
                    </div>

                    <!-- 空狀態提示 -->
                    <div id="emptyState" class="hidden p-12 text-center">
                        <div class="text-gray-300 text-5xl mb-4"><i class="fa-solid fa-clipboard-question"></i></div>
                        <p class="text-gray-400 text-sm" id="emptyStateText">目前此區沒有待審題目</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================== -->
    <!-- 全螢幕審題 / 檢視 Modal        -->
    <!-- ============================== -->
    <div id="reviewModal" class="fixed inset-0 z-[100] hidden">
        <!-- Backdrop -->
        <div id="reviewBackdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity opacity-0">
        </div>

        <!-- Modal Panel -->
        <div id="reviewPanel"
            class="absolute inset-2 md:inset-4 lg:inset-6 bg-[var(--color-oatmeal)] rounded-2xl shadow-2xl flex flex-col overflow-hidden z-10 opacity-0">

            <!-- 頂部工具列 -->
            <div
                class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-200 flex-shrink-0 shadow-sm">
                <div class="flex items-center gap-3">
                    <button id="reviewBackBtn"
                        class="text-gray-500 hover:text-[var(--color-morandi)] flex items-center gap-1 text-sm font-medium transition-colors cursor-pointer">
                        <i class="fa-solid fa-arrow-left"></i> 返回列表
                    </button>
                    <span class="text-gray-300">|</span>
                    <h2 id="reviewModalTitle" class="text-lg font-bold text-[var(--color-slate-main)]">審閱試題</h2>
                    <span id="reviewModalStageBadge"
                        class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-bold border border-gray-200">互審</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-gray-500">
                    <span>命題教師：<strong id="reviewModalAuthor" class="text-[var(--color-slate-main)]">--</strong></span>
                </div>
            </div>

            <!-- 主要內容區（可捲動） -->
            <div class="flex-grow overflow-y-auto custom-scroll" id="reviewModalBody">
                <!-- JS 動態渲染 -->
            </div>

            <!-- 底部操作區（僅審題模式顯示）— 抽屜結構 -->
            <div id="reviewActionArea" class="flex-shrink-0 border-t border-gray-200 bg-white">
                <!-- 抽屜標題列（可點擊展收合） -->
                <div id="drawerToggleBar"
                    class="drawer-toggle-bar flex items-center justify-between px-5 py-2.5 border-b border-gray-100">
                    <div class="flex items-center gap-2">
                        <label class="text-sm font-bold text-gray-700 flex items-center gap-1.5 cursor-pointer">
                            <i class="fa-solid fa-comment-dots text-[var(--color-terracotta)]"></i> 審查意見
                        </label>
                        <span id="drawerHint" class="text-xs text-gray-400">點擊展開</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="duplicateCheckBtn"
                            class="px-3 py-1 text-xs border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-500 font-medium transition-colors cursor-pointer">
                            <i class="fa-solid fa-clone mr-1"></i> 試題重複比對
                        </button>
                        <i id="drawerChevron" class="fa-solid fa-chevron-up drawer-chevron text-gray-400 text-sm"></i>
                    </div>
                </div>
                <!-- 可展收合的抽屜內容 -->
                <div id="drawerBody" class="drawer-body">
                    <div class="px-5 py-3">
                        <!-- 罐頭訊息快速插入 -->
                        <div class="flex gap-1.5 mb-2 overflow-x-auto custom-scroll pb-1" id="cannedMessagesContainer">
                            <!-- JS 渲染罐頭訊息按鈕 -->
                        </div>
                        <!-- 標點符號列 -->
                        <div class="flex items-center gap-1 mb-2 overflow-x-auto custom-scroll pb-1">
                            <span class="text-[10px] text-gray-400 mr-1 flex-shrink-0">標點</span>
                            <button class="punct-btn" data-char="，">，</button>
                            <button class="punct-btn" data-char="。">。</button>
                            <button class="punct-btn" data-char="、">、</button>
                            <button class="punct-btn" data-char="；">；</button>
                            <button class="punct-btn" data-char="：">：</button>
                            <button class="punct-btn" data-char="「」" data-pair="true">「」</button>
                            <button class="punct-btn" data-char="『』" data-pair="true">『』</button>
                            <button class="punct-btn" data-char="（）" data-pair="true">（）</button>
                            <button class="punct-btn" data-char="！">！</button>
                            <button class="punct-btn" data-char="？">？</button>
                            <button class="punct-btn" data-char="——">——</button>
                            <button class="punct-btn" data-char="……">……</button>
                        </div>
                        <!-- Quill 編輯器 -->
                        <div id="reviewQuillContainer"></div>
                    </div>
                </div>
                <!-- 決策按鈕列（始終可見） -->
                <div class="px-5 py-2.5 flex items-center justify-end gap-3 border-t border-gray-100"
                    id="decisionButtonsContainer">
                    <!-- JS 依審查階段動態渲染按鈕 -->
                </div>
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="./js/shared.js"></script>
    <script src="./js/cwt-review.js"></script>
</body>

</html>
