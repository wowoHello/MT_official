<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT 命題工作平臺 - 首頁</title>
    <link rel="icon" type="image/png" href="./assets/images/pencil.png">
    <!-- Tailwind CSS v4 Browser Build -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-oatmeal: #FBF9F6;
            --color-morandi: #6B8EAD;
            --color-sage: #8EAB94;
            --color-terracotta: #D98A6C;
            --color-slate-main: #374151;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-oatmeal);
            color: var(--color-slate-main);
            transition: font-size 0.3s ease;
        }
        
        /* Sidebar Sticky Adjustment */
        @media (min-width: 1024px) {
            .sticky-sidebar {
                position: sticky;
                top: 5rem; /* account for navbar + padding */
                max-height: calc(100vh - 6rem);
            }
        }
        
        /* Custom scrollbar for sidebar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Card Hover Effects - Soft glow/border instead of transform-y to prevent movement while clicking */
        .menu-card {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .menu-card:hover {
            border-color: var(--color-morandi);
            box-shadow: 0 10px 25px -5px rgba(107, 142, 173, 0.2);
        }
    </style>
</head>

<body class="min-h-screen relative flex flex-col">
    <!-- Navbar Container (Injected via shared.js) -->
    <div id="navbar-container"></div>

    <!-- Main Content wrapper -->
    <div class="flex-grow py-8 px-4 sm:px-6 lg:px-8 max-w-[1920px] mx-auto w-full">
        <!-- Dashboard Welcome -->
        <div class="mb-6 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold mb-1">功能總覽儀表板</h1>
                <p class="text-gray-500 text-sm">請選擇您要執行的作業項目。若該梯次無您的任務，對應功能將無法進入。</p>
            </div>
            <div id="currentDateDisplay"
                class="text-sm font-medium text-[var(--color-morandi)] bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">
                <i class="fa-regular fa-calendar"></i> <span>載入中...</span>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">

            <!-- Left Grid: 8 Function Cards -->
            <div class="lg:w-2/3 xl:w-3/4">
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5" id="menuCardsContainer">
                    <!-- Cards will be populated dynamically by firstpage.js to handle permission simulation -->
                </div>
            </div>

            <!-- Right Sidebar: Today's Reminders -->
            <div class="lg:w-1/3 xl:w-1/4">
                <div class="sticky-sidebar flex flex-col gap-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 mb-1">
                        <i class="fa-regular fa-bell text-[var(--color-terracotta)]"></i> 今日提醒看板
                    </h2>

                    <!-- Freeze Zone: Urgent Alerts -->
                    <div class="bg-red-50 rounded-xl border border-red-100 overflow-hidden shadow-sm shadow-red-100/50">
                        <div
                            class="bg-red-100 px-4 py-2 font-bold text-[var(--color-terracotta)] text-sm border-b border-red-200">
                            急件 / 到期警示
                        </div>
                        <ul class="divide-y divide-red-100" id="urgentReminderList">
                            <!-- Populated by JS -->
                        </ul>
                    </div>

                    <!-- Scroll Zone: System Announcements -->
                    <div
                        class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col flex-grow overflow-hidden">
                        <div
                            class="bg-gray-50 px-4 py-3 font-bold text-gray-700 text-sm border-b border-gray-200 flex justify-between items-center">
                            <span>公告與通知</span>
                            <span class="text-xs font-normal text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full"
                                id="announcementCount">0</span>
                        </div>
                        <div class="overflow-y-auto custom-scroll max-h-[400px]" id="announcementList">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>



    <!-- Announcement Modal -->
    <div id="noticeModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm modal-backdrop transition-opacity"></div>
        <!-- Modal Content -->
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 relative z-10 flex flex-col max-h-[90vh] transform scale-95 opacity-0 transition-all duration-300"
            id="noticePanel">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-start">
                <div>
                    <div id="noticeModalTags" class="mb-2 flex gap-2"></div>
                    <h2 class="text-xl font-bold text-[var(--color-slate-main)] leading-tight" id="noticeModalTitle">
                        公告標題</h2>
                    <div class="text-xs text-gray-500 mt-2 flex items-center gap-1">
                        <i class="fa-regular fa-clock"></i> 發布時間：<span id="noticeModalDate"></span>
                    </div>
                </div>
                <button type="button"
                    class="close-modal-btn text-gray-400 hover:text-gray-600 focus:outline-none w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors flex-shrink-0 ml-4">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="p-6 overflow-y-auto custom-scroll text-gray-700 leading-relaxed text-sm md:text-base space-y-4"
                id="noticeModalContent">
                <!-- Content will be injected here -->
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 rounded-b-xl flex justify-end">
                <button type="button"
                    class="close-modal-btn px-6 py-2 bg-[var(--color-morandi)] hover:bg-[#5b7a95] text-white rounded-lg font-medium transition-colors focus:outline-none">
                    確認關閉
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- shared.js 必須先於 specific頁面載入以注入 Navbar -->
    <script src="./js/shared.js"></script>
    <script src="./js/firstpage.js"></script>
</body>

</html>
