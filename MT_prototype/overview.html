<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT 命題工作平臺 - 命題總覽</title>
    <link rel="icon" type="image/png" href="./assets/images/pencil.png">
    <!-- Tailwind CSS v4 Browser Build -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-oatmeal: #FBF9F6;
            --color-morandi: #6B8EAD;
            --color-sage: #8EAB94;
            --color-terracotta: #D98A6C;
            --color-slate-main: #374151;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-oatmeal);
            color: var(--color-slate-main);
            transition: font-size 0.3s ease;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Stepper Styles */
        .step-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
        }
        .step-line {
            position: absolute;
            top: 12px;
            left: 24px;
            right: 0px;
            height: 2px;
            z-index: 0;
        }
        .step-container:last-child .step-line {
            display: none;
        }

        /* Animations */
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(217, 138, 108, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(217, 138, 108, 0.1); }
        }
        .animate-pulse-red { animation: pulse-red 2s infinite; }
        
        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 0 0 rgba(107, 142, 173, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(107, 142, 173, 0.1); }
        }
        .animate-pulse-blue { animation: pulse-blue 2s infinite; }
    </style>
</head>

<body class="min-h-screen relative flex flex-col h-screen overflow-hidden">
    <!-- Navbar Container -->
    <div id="navbar-container" class="flex-shrink-0"></div>

    <!-- Main Content wrapper -->
    <div class="flex-grow flex flex-col w-full max-w-[1920px] mx-auto h-[calc(100vh-4rem)] overflow-hidden">

        <!-- Breadcrumb & Header Row -->
        <div class="px-4 sm:px-6 lg:px-8 py-4 flex-shrink-0 bg-white/50 backdrop-blur border-b border-gray-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <nav class="flex text-sm text-gray-500 mb-1 font-medium" aria-label="Breadcrumb">
                        <ol class="inline-flex items-center space-x-1 md:space-x-2">
                            <li class="inline-flex items-center">
                                <a href="firstpage.html"
                                    class="inline-flex items-center hover:text-[var(--color-morandi)] transition-colors">
                                    <i class="fa-solid fa-house mr-1"></i> 首頁
                                </a>
                            </li>
                            <li>
                                <div class="flex items-center">
                                    <i class="fa-solid fa-chevron-right text-xs mx-1"></i>
                                    <span class="text-[var(--color-slate-main)]">命題總覽</span>
                                </div>
                            </li>
                        </ol>
                    </nav>
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-[var(--color-morandi)]"></i> 當前梯次：命題總覽
                    </h1>
                </div>
                <!-- Optional Header Actions -->
                <div class="flex gap-2">
                    <button id="exportCsvBtn"
                        class="px-4 py-2 bg-white border border-gray-300 rounded text-sm font-medium hover:bg-gray-50 text-gray-700 transition-colors shadow-sm">
                        <i class="fa-solid fa-file-export mr-1"></i> 匯出報表
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Body -->
        <div class="flex-grow flex flex-col overflow-y-auto custom-scroll p-4 sm:p-6 lg:p-8 relative">

            <!-- Statistics Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-6 shrink-0" id="statsContainer">
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 transition duration-200 hover:shadow-md">
                    <div class="text-gray-500 text-xs font-bold mb-1 flex items-center justify-between">
                        總題數 <i class="fa-solid fa-hashtag text-[var(--color-morandi)] opacity-50"></i>
                    </div>
                    <div class="text-2xl font-bold text-[var(--color-slate-main)]" id="statTotal">--</div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 transition duration-200 hover:shadow-md">
                    <div class="text-gray-500 text-xs font-bold mb-1 flex items-center justify-between">
                        命題進行中 <i class="fa-solid fa-pen text-[var(--color-sage)] opacity-50"></i>
                    </div>
                    <div class="text-2xl font-bold text-[var(--color-slate-main)]" id="statDraft">--</div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 transition duration-200 hover:shadow-md">
                    <div class="text-gray-500 text-xs font-bold mb-1 flex items-center justify-between">
                        已採用 <i class="fa-solid fa-circle-check text-[var(--color-sage)] opacity-50"></i>
                    </div>
                    <div class="text-2xl font-bold text-[var(--color-sage)]" id="statAdopted">--</div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 transition duration-200 hover:shadow-md">
                    <div class="text-gray-500 text-xs font-bold mb-1 flex items-center justify-between">
                        待修編 (退回) <i class="fa-solid fa-rotate-left text-[var(--color-terracotta)] opacity-50"></i>
                    </div>
                    <div class="text-2xl font-bold text-[var(--color-terracotta)]" id="statEditing">--</div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 transition duration-200 hover:shadow-md col-span-2 md:col-span-4 lg:col-span-1 border-l-4 border-l-[var(--color-morandi)]">
                    <div class="text-gray-500 text-xs font-bold mb-1">各審查環節卡關中</div>
                    <div
                        class="text-sm font-bold text-[var(--color-slate-main)] flex gap-2 w-full justify-between items-end mt-2">
                        <div class="text-center w-1/3"><span class="block text-gray-400 text-[10px]">待審</span><span
                                id="statPending" class="text-lg text-blue-600">--</span></div>
                        <div class="text-center w-1/3"><span class="block text-gray-400 text-[10px]">互審中</span><span
                                id="statPeerReviewing" class="text-lg">--</span></div>
                        <div class="text-center w-1/3"><span class="block text-gray-400 text-[10px]">專審中</span><span
                                id="statExpertReviewing" class="text-lg">--</span></div>
                    </div>
                </div>
            </div>

            <!-- Main Panel: Filters & List -->
            <div
                class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-grow overflow-hidden relative">

                <!-- Filters Bar -->
                <div
                    class="p-4 border-b border-gray-100 bg-gray-50 flex flex-col md:flex-row gap-3 items-center justify-between shrink-0">
                    <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                        <div class="relative w-full md:w-64">
                            <i class="fa-solid fa-magnifying-glass left-3 top-2.5 absolute text-gray-400"></i>
                            <input type="text" id="filterKeyword"
                                class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)]"
                                placeholder="搜尋題號或教師姓名...">
                        </div>
                        <select id="filterType"
                            class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)] bg-white cursor-pointer">
                            <option value="all">所有題型</option>
                            <option value="single">一般單選題</option>
                            <option value="select">精選單選題</option>
                            <option value="readGroup">閱讀題組</option>
                            <option value="longText">長文題目</option>
                            <option value="shortGroup">短文題組</option>
                            <option value="listen">聽力測驗</option>
                            <option value="listenGroup">聽力題組</option>
                        </select>
                        <select id="filterLevel"
                            class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)] bg-white cursor-pointer">
                            <option value="all">所有等級</option>
                            <!-- 一般等級 -->
                            <option value="初級" class="opt-normal">初級</option>
                            <option value="中級" class="opt-normal">中級</option>
                            <option value="中高級" class="opt-normal">中高級</option>
                            <option value="高級" class="opt-normal">高級</option>
                            <option value="優級" class="opt-normal">優級</option>
                            <!-- 聽力等級 -->
                            <option value="難度一" class="opt-listen hidden">難度一</option>
                            <option value="難度二" class="opt-listen hidden">難度二</option>
                            <option value="難度三" class="opt-listen hidden">難度三</option>
                            <option value="難度四" class="opt-listen hidden">難度四</option>
                            <option value="難度五" class="opt-listen hidden">難度五</option>
                        </select>
                        <select id="filterStatus"
                            class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)] bg-white cursor-pointer">
                            <option value="all">所有狀態</option>
                            <option value="working">階段推進中</option>
                            <option value="editing">退回修題中</option>
                            <option value="adopted">已採用入庫</option>
                            <option value="rejected">不採用報廢</option>
                        </select>
                    </div>

                    <div class="text-sm text-gray-500 font-medium">
                        共 <span id="listCount" class="text-[var(--color-morandi)] font-bold">0</span> 題
                    </div>
                </div>

                <!-- Table Header -->
                <div
                    class="grid grid-cols-12 gap-4 px-6 py-3 border-b border-gray-200 bg-white text-xs font-bold text-gray-500 uppercase tracking-wider shrink-0 sticky top-0 z-20 shadow-sm">
                    <div class="col-span-2">題號 / 作者</div>
                    <div class="col-span-2 lg:col-span-1">題型</div>
                    <div class="col-span-2 lg:col-span-1">等級/難度</div>
                    <div class="col-span-5 lg:col-span-7 hidden lg:block text-center">三審狀態軌跡 (7 階段)</div>
                    <div class="col-span-1 text-center">當前狀態</div>
                </div>

                <!-- Question List Body -->
                <div class="flex-grow overflow-y-auto custom-scroll" id="overviewListContainer">
                    <!-- JS Injected rows -->
                    <div class="p-8 text-center text-gray-400">載入中...</div>
                </div>
            </div>
        </div>
    </div>


    <!-- ============================================== -->
    <!-- Slide-over panel: 試題詳情檢視 -->
    <!-- ============================================== -->
    <div id="slideOverWrapper" class="fixed inset-0 z-50 overflow-hidden hidden">
        <!-- Backdrop -->
        <div id="slideOverBackdrop"
            class="absolute inset-0 bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>

        <div class="absolute inset-y-0 right-0 flex max-w-full pl-10 sm:pl-16">
            <!-- Panel -->
            <div id="slideOverPanel"
                class="w-screen max-w-3xl transform transition ease-in-out duration-300 translate-x-full bg-[var(--color-oatmeal)] shadow-2xl flex flex-col">

                <!-- Panel Header -->
                <div
                    class="px-6 py-4 border-b border-gray-200 bg-white flex items-center justify-between shadow-sm z-10 shrink-0">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-bold text-[var(--color-slate-main)] font-mono" id="dtlQid">...</h2>
                        <span id="dtlStatusBadge"
                            class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 font-bold border border-gray-200">...</span>
                        <span id="dtlWarningBadge"
                            class="hidden text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-600 font-bold border border-red-200 animate-pulse"><i
                                class="fa-solid fa-triangle-exclamation mr-1"></i>總召強制收回</span>
                    </div>
                    <button type="button" onclick="closePanel()"
                        class="cursor-pointer text-gray-400 hover:text-gray-600 w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <!-- Panel Body (Scrollable) -->
                <div class="flex-grow overflow-y-auto custom-scroll p-6 space-y-6">

                    <!-- 上半部：題目內容區塊 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                            <div>
                                <div class="text-xs text-gray-400 mb-1">命題教師</div>
                                <div class="text-sm font-bold text-gray-800 flex items-center gap-2">
                                    <i class="fa-solid fa-user text-[var(--color-morandi)]"></i> <span
                                        id="dtlAuthor">...</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-400 mb-1">題型 / 等級 / 難易度</div>
                                <div class="text-sm font-bold text-gray-800">
                                    <span id="dtlType">...</span> / <span id="dtlLevel"
                                        class="text-[var(--color-morandi)]">...</span> / <span id="dtlDiff"
                                        class="text-[var(--color-terracotta)]">...</span>
                                </div>
                            </div>
                        </div>

                        <!-- 題目展示區 (Mock Rich Text Content) -->
                        <div class="mb-4">
                            <h3 class="text-xs font-bold text-[var(--color-morandi)] uppercase tracking-wider mb-2">題幹內容
                            </h3>
                            <div class="text-base leading-relaxed text-gray-800 p-4 bg-gray-50 rounded-lg min-h-[100px] border border-gray-100"
                                id="dtlContent">
                                <!-- JS Injection -->
                            </div>
                        </div>
                    </div>

                    <!-- 下半部：三審歷史軌跡 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3
                            class="text-lg font-bold text-[var(--color-slate-main)] mb-6 flex items-center gap-2 border-b border-gray-100 pb-3">
                            <i class="fa-solid fa-clock-rotate-left text-[var(--color-sage)]"></i> 歷程軌跡與審查意見
                        </h3>

                        <!-- Timeline Log -->
                        <div class="relative border-l-2 border-gray-200 ml-4 pl-6 space-y-6 py-2" id="dtlTimelineLogs">
                            <!-- JS Injection -->
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>


    <!-- Load Scripts -->
    <script src="js/shared.js"></script>
    <script src="js/overview.js"></script>
</body>

</html>
