<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT 命題工作平臺 - 命題任務</title>
    <link rel="icon" type="image/png" href="./assets/images/pencil.png">
    <!-- Tailwind CSS v4 Browser Build -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-oatmeal: #FBF9F6;
            --color-morandi: #6B8EAD;
            --color-sage: #8EAB94;
            --color-terracotta: #D98A6C;
            --color-slate-main: #374151;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-oatmeal);
            color: var(--color-slate-main);
            transition: font-size 0.3s ease;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tab 底線動畫 */
        .tab-btn {
            position: relative;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: #6b7280;
            transition: color 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            border: none;
            background: none;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 3px 3px 0 0;
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }
        .tab-btn:hover { color: var(--color-slate-main); }
        .tab-btn.active-compose { color: var(--color-sage); }
        .tab-btn.active-compose::after { background: var(--color-sage); transform: scaleX(1); }
        .tab-btn.active-revision { color: var(--color-terracotta); }
        .tab-btn.active-revision::after { background: var(--color-terracotta); transform: scaleX(1); }
        .tab-btn.active-history { color: var(--color-morandi); }
        .tab-btn.active-history::after { background: var(--color-morandi); transform: scaleX(1); }

        /* 配額進度條 */
        .quota-bar { height: 4px; border-radius: 2px; transition: width 0.6s ease; }

        /* 題目卡片 hover */
        .q-card {
            transition: all 0.15s ease;
            border: 1.5px solid transparent;
        }
        .q-card:hover {
            border-color: var(--color-morandi);
            box-shadow: 0 4px 12px -2px rgba(107, 142, 173, 0.15);
        }

        /* 修題卡片強調邊框 */
        .q-card-revision {
            border-left: 4px solid var(--color-terracotta);
        }

        /* Quill 編輯器客製化 */
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #e5e7eb !important; background: #f9fafb; flex-shrink: 0; }
        .ql-toolbar.ql-snow .ql-formats { margin-right: 10px; }
        .ql-container.ql-snow { border: none !important; font-family: 'Noto Sans TC', sans-serif; font-size: 1rem; min-height: 0; }
        #quillEditorContainer { display: flex; flex-direction: column; height: clamp(14rem, 26vh, 17rem); min-height: 0; }
        #quillEditorContainer .ql-toolbar.ql-snow { flex-shrink: 0; }
        #quillEditorContainer .ql-container.ql-snow { flex: 1; min-height: 0; }
        .ql-editor { min-height: 0; height: 100%; max-height: 100%; overflow-y: auto; line-height: 1.8; }
        .ql-editor:focus { outline: none; }
        .ql-font-dfkai-sb { font-family: 'DFKai-SB', 'BiauKai', 'KaiTi', serif; }
        .ql-font-times-new-roman { font-family: 'Times New Roman', Times, serif; }
        .ql-snow .ql-picker.ql-size { width: 5.5rem; }
        .ql-snow .ql-picker.ql-header { width: 6.75rem; }
        .ql-snow .ql-picker.ql-font { width: 9rem; }
        .ql-snow .ql-picker.ql-font .ql-picker-label:not([data-value])::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item:not([data-value])::before,
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="dfkai-sb"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="dfkai-sb"]::before {
            content: '標楷體';
            font-family: 'DFKai-SB', 'BiauKai', 'KaiTi', serif;
        }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times-new-roman"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times-new-roman"]::before {
            content: 'Times New Roman';
            font-family: 'Times New Roman', Times, serif;
        }
        /* 中文標點按鈕 */
        .punct-btn {
            padding: 2px 8px;
            font-size: 0.875rem;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .punct-btn:hover { background: var(--color-morandi); color: white; border-color: var(--color-morandi); }

        /* 可編輯欄位點擊效果 */
        .editable-field {
            cursor: text;
            transition: all 0.2s ease;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.5rem;
            min-height: 80px;
            padding: 1rem;
        }
        .editable-field:hover { border-color: #93c5fd; }
        .editable-field.editing { border-color: var(--color-morandi); box-shadow: 0 0 0 3px rgba(107,142,173,0.15); }

        /* 階段指示燈 */
        @keyframes stage-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(142, 171, 148, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(142, 171, 148, 0); }
        }
        .stage-active { animation: stage-pulse 2s infinite; }

        /* 表單 modal 動畫 */
        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.97) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate-in { animation: modalSlideIn 0.3s ease forwards; }

        /* 自動儲存提示 */
        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
        .autosave-flash { animation: fadeInOut 2s ease forwards; }
    </style>
</head>

<body class="min-h-screen relative flex flex-col h-screen overflow-hidden">
    <!-- Navbar Container (Injected via shared.js) -->
    <div id="navbar-container" class="flex-shrink-0"></div>

    <!-- ============================== -->
    <!-- Main Content Area              -->
    <!-- ============================== -->
    <div class="flex-grow flex flex-col w-full max-w-[1920px] mx-auto h-[calc(100vh-4rem)] overflow-hidden">

        <!-- Header: Breadcrumb + Title + Actions -->
        <div class="px-4 sm:px-6 lg:px-8 py-4 flex-shrink-0 bg-white/50 backdrop-blur-sm border-b border-gray-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <div>
                    <nav class="flex text-sm text-gray-500 mb-1 font-medium" aria-label="Breadcrumb">
                        <ol class="inline-flex items-center space-x-1">
                            <li><a href="firstpage.html" class="hover:text-[var(--color-morandi)] transition-colors"><i
                                        class="fa-solid fa-house mr-1"></i> 首頁</a></li>
                            <li>
                                <div class="flex items-center"><i
                                        class="fa-solid fa-chevron-right text-xs mx-1.5"></i><span
                                        class="text-[var(--color-slate-main)]">命題任務</span></div>
                            </li>
                        </ol>
                    </nav>
                    <div class="flex items-center gap-3">
                        <h1 class="text-2xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-pen-ruler text-[var(--color-morandi)]"></i> 命題任務
                        </h1>
                        <!-- 當前階段指示燈 -->
                        <span id="stageIndicator"
                            class="inline-flex items-center gap-1.5 text-xs font-bold px-3 py-1 rounded-full bg-[var(--color-sage)]/15 text-[var(--color-sage)] border border-[var(--color-sage)]/30">
                            <span class="w-2 h-2 rounded-full bg-[var(--color-sage)] stage-active"></span>
                            命題階段進行中
                        </span>
                    </div>
                </div>
                <button id="newQuestionBtn"
                    class="px-5 py-2.5 bg-[var(--color-sage)] hover:bg-[#7a9a82] text-white rounded-lg font-bold text-sm transition-colors shadow-sm flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-plus"></i> 新增試題
                </button>
            </div>
        </div>

        <!-- Scrollable Body -->
        <div class="flex-grow overflow-y-auto custom-scroll">

            <!-- ============================== -->
            <!-- 配額進度卡片列                    -->
            <!-- ============================== -->
            <div class="px-4 sm:px-6 lg:px-8 pt-5 pb-3">
                <div class="flex items-center gap-2 mb-3">
                    <h2 class="text-sm font-bold text-gray-500"><i class="fa-solid fa-chart-pie mr-1"></i> 我的命題配額進度</h2>
                    <span id="quotaTotalProgress" class="text-xs text-gray-400 font-medium">-- / --</span>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3" id="quotaCardsContainer">
                    <!-- JS 動態渲染 7 張配額卡片 -->
                </div>
            </div>

            <!-- ============================== -->
            <!-- 三大 Tab 工作區                   -->
            <!-- ============================== -->
            <div class="px-4 sm:px-6 lg:px-8 pb-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

                    <!-- Tab Bar (Sticky) -->
                    <div class="flex border-b border-gray-200 bg-white sticky top-0 z-20 overflow-x-auto">
                        <button class="tab-btn active-compose" data-tab="compose">
                            <i class="fa-solid fa-pen-nib mr-1.5 text-[var(--color-sage)]"></i>命題作業區
                            <span id="tabCountCompose"
                                class="ml-2 text-xs bg-[var(--color-sage)]/15 text-[var(--color-sage)] px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                        <button class="tab-btn" data-tab="revision">
                            <i class="fa-solid fa-rotate-left mr-1.5 text-[var(--color-terracotta)]"></i>審修作業區
                            <span id="tabCountRevision"
                                class="ml-2 text-xs bg-[var(--color-terracotta)]/15 text-[var(--color-terracotta)] px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                        <button class="tab-btn" data-tab="history">
                            <i class="fa-solid fa-box-archive mr-1.5 text-[var(--color-morandi)]"></i>審核結果與歷史
                            <span id="tabCountHistory"
                                class="ml-2 text-xs bg-[var(--color-morandi)]/15 text-[var(--color-morandi)] px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>

                    <!-- Tab 統計卡片區 -->
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50 flex-shrink-0" id="tabStatsContainer">
                        <!-- JS 動態渲染，依 Tab 切換顯示不同統計卡片 -->
                    </div>

                    <!-- 篩選列 -->
                    <div
                        class="p-4 border-b border-gray-100 bg-white flex flex-col xl:flex-row gap-3 items-start xl:items-center justify-between flex-shrink-0">
                        <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                            <div class="relative w-full md:w-56">
                                <i class="fa-solid fa-magnifying-glass left-3 top-2.5 absolute text-gray-400"></i>
                                <input type="text" id="filterKeyword"
                                    class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] focus:border-[var(--color-morandi)]"
                                    placeholder="搜尋題號或關鍵字...">
                            </div>
                            <select id="filterType"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有題型</option>
                                <option value="single">一般單選題</option>
                                <option value="select">精選單選題</option>
                                <option value="readGroup">閱讀題組</option>
                                <option value="longText">長文題目</option>
                                <option value="shortGroup">短文題組</option>
                                <option value="listen">聽力測驗</option>
                                <option value="listenGroup">聽力題組</option>
                            </select>
                            <select id="filterLevel"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有等級</option>
                                <!-- 一般等級 -->
                                <option value="初級" class="opt-normal">初級</option>
                                <option value="中級" class="opt-normal">中級</option>
                                <option value="中高級" class="opt-normal">中高級</option>
                                <option value="高級" class="opt-normal">高級</option>
                                <option value="優級" class="opt-normal">優級</option>
                                <!-- 聽力難度等級 -->
                                <option value="難度一" class="opt-listen hidden">難度一</option>
                                <option value="難度二" class="opt-listen hidden">難度二</option>
                                <option value="難度三" class="opt-listen hidden">難度三</option>
                                <option value="難度四" class="opt-listen hidden">難度四</option>
                                <option value="難度五" class="opt-listen hidden">難度五</option>
                            </select>
                            <select id="filterStatus"
                                class="w-full md:w-auto px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="all">所有狀態</option>
                            </select>
                        </div>
                        <div class="flex flex-wrap items-center justify-between gap-3 w-full xl:w-auto xl:justify-end">
                            <label class="flex items-center gap-2 text-sm text-gray-500 font-medium whitespace-nowrap">
                                每頁顯示
                                <select id="pageSizeSelect"
                                    class="px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                    <option value="12">12 題</option>
                                    <option value="24">24 題</option>
                                    <option value="48">48 題</option>
                                </select>
                            </label>
                            <div id="listMeta" class="text-sm text-gray-500 font-medium flex-shrink-0">
                                共 <span id="listCount" class="text-[var(--color-morandi)] font-bold">0</span> 題
                                <span id="listPageMeta" class="text-xs text-gray-400 ml-1"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 題目列表 -->
                    <div class="divide-y divide-gray-100" id="questionListContainer">
                        <div class="p-12 text-center text-gray-400">
                            <i class="fa-solid fa-spinner fa-spin mr-2"></i> 載入中...
                        </div>
                    </div>

                    <div id="listPagination"
                        class="hidden px-4 py-3 border-t border-gray-100 bg-gray-50/70 flex flex-col sm:flex-row items-center justify-between gap-3">
                    </div>
                    <!-- 空狀態提示 -->
                    <div id="emptyState" class="hidden p-12 text-center">
                        <div class="text-gray-300 text-5xl mb-4"><i class="fa-solid fa-file-circle-plus"></i></div>
                        <p class="text-gray-400 text-sm" id="emptyStateText">目前此區沒有試題</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================== -->
    <!-- 全螢幕表單 Modal                 -->
    <!-- ============================== -->
    <div id="formModal" class="fixed inset-0 z-[100] hidden">
        <!-- Backdrop -->
        <div id="formBackdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity opacity-0"></div>

        <!-- Modal Panel -->
        <div id="formPanel"
            class="absolute inset-2 md:inset-4 lg:inset-6 bg-[var(--color-oatmeal)] rounded-2xl shadow-2xl flex flex-col overflow-hidden z-10 opacity-0">

            <!-- 頂部工具列 -->
            <div
                class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-200 flex-shrink-0 shadow-sm">
                <div class="flex items-center gap-3">
                    <button id="formBackBtn"
                        class="text-gray-500 hover:text-[var(--color-morandi)] flex items-center gap-1 text-sm font-medium transition-colors cursor-pointer">
                        <i class="fa-solid fa-arrow-left"></i> 返回列表
                    </button>
                    <span class="text-gray-300">|</span>
                    <h2 id="formTitle" class="text-lg font-bold text-[var(--color-slate-main)]">新增試題</h2>
                    <span id="formStatusBadge"
                        class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-bold border border-gray-200">草稿</span>
                    <!-- 自動儲存指示 -->
                    <span id="autosaveIndicator" class="hidden text-xs text-[var(--color-sage)] font-medium ml-2">
                        <i class="fa-solid fa-check-circle mr-0.5"></i> 已自動存檔
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="formPreviewBtn"
                        class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 font-medium transition-colors cursor-pointer">
                        <i class="fa-solid fa-eye mr-1"></i> 預覽
                    </button>
                    <button id="formDraftBtn"
                        class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 font-medium transition-colors cursor-pointer">
                        <i class="fa-regular fa-floppy-disk mr-1"></i> 存為草稿
                    </button>
                    <button id="formSubmitBtn"
                        class="px-4 py-1.5 text-sm bg-[var(--color-sage)] hover:bg-[#7a9a82] text-white rounded-lg font-bold transition-colors cursor-pointer">
                        <i class="fa-solid fa-check mr-1"></i> <span id="formSubmitLabel">命題完成</span>
                    </button>
                </div>
            </div>

            <!-- 修題意見橫幅（僅修題模式顯示） -->
            <div id="revisionBanner" class="hidden flex-shrink-0">
                <div class="px-6 py-4 bg-amber-50 border-b border-amber-200">
                    <div class="flex items-start gap-3">
                        <div
                            class="flex-shrink-0 w-8 h-8 rounded-full bg-[var(--color-terracotta)]/15 text-[var(--color-terracotta)] flex items-center justify-center mt-0.5">
                            <i class="fa-solid fa-comment-dots"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex items-center gap-2 mb-1">
                                <span id="revBannerStage"
                                    class="text-xs font-bold text-[var(--color-terracotta)] bg-[var(--color-terracotta)]/10 px-2 py-0.5 rounded-full">互審意見</span>
                                <span id="revBannerReviewer" class="text-xs text-gray-500">審查人：王健明</span>
                                <span id="revBannerCount" class="text-xs text-gray-400 ml-auto">退回次數：1/2</span>
                            </div>
                            <p id="revBannerComment" class="text-sm text-gray-700 leading-relaxed">審查意見內容...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 主要內容區：左側邊欄 + 右側編輯 -->
            <div class="flex-grow flex overflow-hidden relative">

                <button id="formSidebarToggleBtn" type="button" aria-controls="formSidebar" aria-expanded="true"
                    class="absolute top-1/2 left-0 z-20 flex h-28 w-10 -translate-y-1/2 flex-col items-center justify-center gap-2 rounded-r-2xl border border-l-0 border-gray-200 bg-white/95 text-[var(--color-morandi)] shadow-lg backdrop-blur-sm transition-[left,background-color,box-shadow,transform] duration-300 ease-out hover:bg-white cursor-pointer">
                    <span id="formSidebarToggleLabel" class="sr-only">收合題目屬性</span>
                    <i id="formSidebarToggleIcon" class="fa-solid fa-chevron-left text-sm"></i>
                    <span class="text-[11px] font-bold tracking-[0.18em] text-gray-500"
                        style="writing-mode: vertical-rl; text-orientation: mixed;">屬性</span>
                </button>

                <!-- 左側邊欄：屬性設定 -->
                <div id="formSidebar"
                    class="w-60 lg:w-72 flex-shrink-0 bg-white border-r border-gray-200 overflow-hidden flex flex-col relative transition-[width,transform,border-color,box-shadow] duration-300 ease-out">
                    <div id="formSidebarBody"
                        class="p-4 space-y-4 flex-grow overflow-y-auto custom-scroll transition-[opacity,transform] duration-300 ease-out">
                        <div class="flex items-center justify-between gap-3">
                            <h3
                                class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1.5">
                                <i class="fa-solid fa-sliders"></i> 題目屬性
                            </h3>
                            <span class="text-[11px] text-gray-300 uppercase tracking-[0.18em]">共用欄位</span>
                        </div>

                        <!-- 題型選擇 -->
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">題型 <span
                                    class="text-red-400">*</span></label>
                            <select id="formType"
                                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="single">一般單選題</option>
                                <option value="select">精選單選題</option>
                                <option value="readGroup">閱讀題組</option>
                                <option value="longText">長文題目</option>
                                <option value="shortGroup">短文題組</option>
                                <option value="listen">聽力測驗</option>
                                <option value="listenGroup">聽力題組</option>
                            </select>
                        </div>

                        <!-- 等級 -->
                        <div id="formLevelWrap">
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">等級 <span
                                    class="text-red-400">*</span></label>
                            <select id="formLevel"
                                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="">請選擇等級</option>
                                <!-- 一般等級 -->
                                <option value="初級" class="opt-normal">初級</option>
                                <option value="中級" class="opt-normal">中級</option>
                                <option value="中高級" class="opt-normal">中高級</option>
                                <option value="高級" class="opt-normal">高級</option>
                                <option value="優級" class="opt-normal">優級</option>
                                <!-- 聽力難度等級 -->
                                <option value="難度一" class="opt-listen hidden">難度一</option>
                                <option value="難度二" class="opt-listen hidden">難度二</option>
                                <option value="難度三" class="opt-listen hidden">難度三</option>
                                <option value="難度四" class="opt-listen hidden">難度四</option>
                                <option value="難度五" class="opt-listen hidden">難度五</option>
                            </select>
                        </div>

                        <!-- 題型專屬屬性（依題型動態渲染） -->
                        <div id="formTypeSpecificAttributes" class="space-y-4"></div>

                        <!-- 難易度 -->
                        <div id="formDifficultyWrap">
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">難易度 <span
                                    class="text-red-400">*</span></label>
                            <select id="formDifficulty"
                                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-morandi)] bg-white cursor-pointer">
                                <option value="">請選擇</option>
                                <option value="easy">易</option>
                                <option value="medium">中</option>
                                <option value="hard">難</option>
                            </select>
                        </div>

                        <hr id="formCommonAttributeDivider" class="border-gray-100">

                        <!-- 正確答案（已整合至右側選項區，此處隱藏） -->
                        <div id="formAnswerSection" class="hidden"></div>
                    </div>

                    <!-- 側邊欄底部提示 -->
                    <div id="formSidebarFooter"
                        class="px-4 py-3 border-t border-gray-100 bg-gray-50/50 text-[11px] text-gray-400 leading-snug transition-[opacity,transform] duration-300 ease-out">
                        <i class="fa-solid fa-circle-info mr-1"></i>
                        點右側欄位，就會滑出底部編輯器。
                    </div>
                </div>

                <!-- 右側：主要編輯區 -->
                <div class="flex-grow overflow-y-auto custom-scroll bg-[var(--color-oatmeal)]" id="formEditorArea">
                    <!-- JS 依題型動態渲染 -->
                </div>
            </div>
            <!-- 修題回覆區（僅修題模式顯示） -->
            <div id="revisionReplyArea" class="hidden flex-shrink-0">
                <div class="px-6 py-4 bg-white border-t border-gray-200">
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        <i class="fa-solid fa-reply mr-1 text-[var(--color-terracotta)]"></i> 修題回覆說明
                        <span class="font-normal text-gray-400 ml-1">（請說明本次修改內容）</span>
                    </label>
                    <textarea id="revisionReplyInput"
                        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-[var(--color-terracotta)] focus:border-[var(--color-terracotta)] resize-none"
                        rows="2" placeholder="例如：已修正選項 (C) 的語法錯誤，並調整解析內容..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================== -->
    <!-- 底部滑入式 Quill 編輯器          -->
    <!-- ============================== -->
    <div id="quillPanel" class="fixed inset-0 z-[150] pointer-events-none">
        <button id="quillBackdrop" type="button" aria-label="收合編輯器"
            class="absolute inset-0 bg-slate-900/10 opacity-0 transition-opacity duration-300 ease-out"></button>
        <div id="quillSheet"
            class="absolute inset-x-0 bottom-0 transform translate-y-full transition-transform duration-300 ease-in-out">
            <div
                class="bg-white border-t-2 border-[var(--color-morandi)] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] pointer-events-auto max-h-[44vh] flex flex-col rounded-t-2xl overflow-hidden">
                <!-- 編輯器標頭：欄位指示 + 中文標點 + 收起 -->
                <div class="flex items-center justify-between px-4 py-2 bg-gray-50 border-b border-gray-200 gap-2">
                    <div class="flex items-center gap-2 text-sm text-gray-600 min-w-0 flex-wrap">
                        <i class="fa-solid fa-pen-to-square text-[var(--color-morandi)]"></i>
                        <span class="text-gray-500">正在編輯：</span>
                        <span id="quillTargetLabel" class="font-bold text-[var(--color-slate-main)] truncate">題幹</span>
                        <span id="quillWordCount"
                            class="inline-flex items-center rounded-full border border-amber-200 bg-amber-50 px-2.5 py-1 text-xs font-semibold text-amber-700">字數：0</span>
                    </div>
                    <div class="flex items-center gap-1 overflow-x-auto custom-scroll flex-shrink">
                        <span class="text-[10px] text-gray-400 mr-1 flex-shrink-0">快速插入</span>
                        <button class="punct-btn" data-char="，">，</button>
                        <button class="punct-btn" data-char="。">。</button>
                        <button class="punct-btn" data-char="、">、</button>
                        <button class="punct-btn" data-char="；">；</button>
                        <button class="punct-btn" data-char="：">：</button>
                        <button class="punct-btn" data-char="「」" data-pair="true">「」</button>
                        <button class="punct-btn" data-char="『』" data-pair="true">『』</button>
                        <button class="punct-btn" data-char="（）" data-pair="true">（）</button>
                        <button class="punct-btn" data-char="！">！</button>
                        <button class="punct-btn" data-char="？">？</button>
                        <button class="punct-btn" data-char="——">——</button>
                        <button class="punct-btn" data-char="……">……</button>
                    </div>
                    <button id="quillCloseBtn"
                        class="text-sm text-gray-400 hover:text-gray-600 font-medium transition-colors cursor-pointer flex items-center gap-1 flex-shrink-0 ml-2">
                        <i class="fa-solid fa-chevron-down"></i> 收起
                    </button>
                </div>
                <!-- Quill 編輯器容器 -->
                <div id="quillEditorContainer"></div>
            </div>
        </div>
    </div>

    <!-- ============================== -->
    <!-- 預覽 Modal（考試卷樣式）         -->
    <!-- ============================== -->
    <div id="previewModal" class="hidden fixed inset-0 z-[120] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="previewBackdrop"></div>
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl mx-4 relative z-10 flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center flex-shrink-0">
                <h2 class="text-lg font-bold text-[var(--color-slate-main)]"><i
                        class="fa-solid fa-file-lines mr-2 text-[var(--color-morandi)]"></i>考卷預覽</h2>
                <button id="previewCloseBtn"
                    class="text-gray-400 hover:text-gray-600 w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors cursor-pointer">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="p-8 overflow-y-auto custom-scroll" id="previewContent">
                <!-- JS 動態渲染考卷預覽 -->
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="./js/shared.js"></script>
    <script src="./js/cwt-list.js"></script>
</body>

</html>
